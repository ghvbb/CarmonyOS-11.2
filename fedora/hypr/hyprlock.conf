# ━━━ COLOR SOURCE ━━━
source = ~/.cache/colors/colors.conf

# ━━━ WALLPAPER SOURCE ━━━
$image = ~/.cache/current_wallpaper.png

general {
    hide_cursor = true
    ignore_empty_input = true
}

background {
    monitor =
    path = $image
    blur_passes = 3
    blur_size = 7
}

# ━━━ TIME ━━━
label {
    monitor =
    text = cmd[update:1000] date +"%-I:%M"
    color = $primary
    font_size = 95
    font_family = Google Sans Display
    position = 0, 150
    halign = center
    valign = center
}

# ━━━ DATE ━━━
label {
    monitor =
    text = cmd[update:60000] date +"%A, %B %d"
    color = $on_surface_variant
    font_size = 22
    font_family = Google Sans Display
    position = 0, 60
    halign = center
    valign = center
}

# ━━━ INPUT FIELD (Fixed placeholder color) ━━━
input-field {
    monitor =
    size = 280, 60
    outline_thickness = 3
    dots_size = 0.25
    dots_spacing = 0.15
    dots_center = true

    inner_color = $surface_container
    outer_color = $outline
    font_color = $on_surface

    fade_on_empty = false
    # Using placeholder_color instead of markup to avoid Pango parsing errors
    placeholder_text = 󰌾  Password...
    placeholder_color = $on_surface_variant
    hide_input = false
    rounding = 30

    check_color = $tertiary
    fail_color = $error
    fail_text = $FAIL <b>($ATTEMPTS)</b>

    position = 0, -40
    halign = center
    valign = center
}

# ━━━ MEDIA PLAYER (Artist / Title) ━━━
label {
    monitor =
    text = cmd[update:1000] ~/.config/hypr/scripts/player_artist.sh
    color = $primary
    font_size = 14
    font_family = Google Sans Display Bold
    position = 40, 85
    halign = left
    valign = bottom
}

label {
    monitor =
    text = cmd[update:200] ~//.config/hypr/scripts/player_title.sh
    color = $on_surface_variant
    font_size = 12
    font_family = Google Sans Display
    position = 40, 65
    halign = left
    valign = bottom
}

# ━━━ CAPS LOCK INDICATOR (Robust) ━━━
label {
    monitor =
    text = 
    color = $error
    font_size = 12
    font_family = Google Sans Display
    position = 0, -110
    halign = center
    valign = center
}

# ━━━ USER INFO ━━━
label {
    monitor =
    text =   $USER
    color = $on_surface_variant
    font_size = 14
    font_family = Google Sans Display
    position = 0, 30
    halign = center
    valign = bottom
}
