# ═══════════════════════════════════════════════════════
# Kitty · Classic Mac OS (System 7 / Mac OS 8) Style
# Platinum appearance · Chicago font · Retro 90s vibes
# ═══════════════════════════════════════════════════════

# ─────────────────────────────────────────────
# Font: Classic Mac typography
# ─────────────────────────────────────────────
font_family      Chicago
bold_font        ChicagoFLF
italic_font      ChicagoFLF
bold_italic_font Chicago
font_size        11.0

# Fallback fonts (if Monaco unavailable)
# font_family    ChicagoFLF
# font_family    Geneva
# font_family    Liberation Mono

# ─────────────────────────────────────────────
# Cursor: Classic Mac I-beam
# ─────────────────────────────────────────────
cursor_shape           beam
cursor_beam_thickness  1
cursor_blink_interval  0.5
cursor_stop_blinking_after 0

# ─────────────────────────────────────────────
# Window: Sharp edges, no decorations
# ─────────────────────────────────────────────
hide_window_decorations       yes
window_padding_width          8
window_margin_width           0
single_window_margin_width    0
draw_minimal_borders          yes
window_border_width           1pt
active_border_color           none
placement_strategy            center
remember_window_size          no
initial_window_width          80c
initial_window_height         24c

# ─────────────────────────────────────────────
# Tab bar: Classic Mac window tabs
# ─────────────────────────────────────────────
tab_bar_style                 separator
tab_separator                 "│"
tab_bar_edge                  top
tab_bar_margin_width          0.0
tab_bar_margin_height         0.0 0.0
tab_title_template            " {index}: {title} "
active_tab_title_template     "▪{index}: {title}▪"
tab_bar_min_tabs              2
tab_activity_symbol           "◆"
bell_on_tab                   "◆ "

# ─────────────────────────────────────────────
# Performance: Fast rendering
# ─────────────────────────────────────────────
sync_to_monitor         no
repaint_delay           8
input_delay             2
enable_audio_bell       no
visual_bell_duration    0.0

# ─────────────────────────────────────────────
# Scrollback: Minimal
# ─────────────────────────────────────────────
scrollback_lines              2000
scrollback_pager              less --chop-long-lines --RAW-CONTROL-CHARS +INPUT_LINE_NUMBER
scrollback_pager_history_size 0
scrollback_fill_enlarged_window yes
wheel_scroll_multiplier       3.0
wheel_scroll_min_lines        1
touch_scroll_multiplier       1.0

# ─────────────────────────────────────────────
# Mouse: Classic behavior
# ─────────────────────────────────────────────
mouse_hide_wait               0
url_style                     single
open_url_with                 default
url_prefixes                  file ftp ftps gemini git gopher http https irc ircs kitty mailto news sftp ssh
detect_urls                   yes
copy_on_select                no
strip_trailing_spaces         smart
select_by_word_characters     @-./_~?&=%+#

# ─────────────────────────────────────────────
# Shell & remote
# ─────────────────────────────────────────────
shell                         zsh
allow_remote_control          yes
listen_on                     none
confirm_os_window_close       0

# ─────────────────────────────────────────────
# Colors: Import from cache
# ─────────────────────────────────────────────
include ~/.cache/colors/kitty.conf

# Override for retro feel (uncomment if wanted)
# background_opacity          1.0
# dim_opacity                 0.85

# ─────────────────────────────────────────────
# Keybindings: Classic Mac-style
# ─────────────────────────────────────────────

# Clear defaults
clear_all_shortcuts           no

# Copy/paste (Cmd on Mac, Ctrl on Linux)
map ctrl+c                    copy_or_interrupt
map ctrl+v                    paste_from_clipboard
map ctrl+shift+c              copy_to_clipboard
map ctrl+shift+v              paste_from_clipboard

# Font size
map ctrl+equal                change_font_size all +1.0
map ctrl+plus                 change_font_size all +1.0
map ctrl+kp_add               change_font_size all +1.0
map ctrl+minus                change_font_size all -1.0
map ctrl+kp_subtract          change_font_size all -1.0
map ctrl+0                    change_font_size all 0

# Scrolling
map page_up                   scroll_page_up
map page_down                 scroll_page_down
map ctrl+shift+up             scroll_line_up
map ctrl+shift+down           scroll_line_down
map ctrl+shift+home           scroll_home
map ctrl+shift+end            scroll_end

# Tabs
map ctrl+shift+t              new_tab
map ctrl+shift+w              close_tab
map ctrl+shift+right          next_tab
map ctrl+shift+left           previous_tab
map ctrl+shift+.              move_tab_forward
map ctrl+shift+,              move_tab_backward
map ctrl+1                    goto_tab 1
map ctrl+2                    goto_tab 2
map ctrl+3                    goto_tab 3
map ctrl+4                    goto_tab 4
map ctrl+5                    goto_tab 5

# Windows/splits
map ctrl+shift+enter          new_window
map ctrl+shift+n              new_os_window
map ctrl+shift+q              close_window
map ctrl+shift+]              next_window
map ctrl+shift+[              previous_window

# Search
map ctrl+f                    launch --location=hsplit --allow-remote-control kitty +kitten search.py @active-kitty-window-id
map ctrl+shift+f              show_scrollback

# Misc
map ctrl+shift+f5             load_config_file
map ctrl+shift+u              kitten unicode_input
map ctrl+shift+escape         kitty_shell window
