##################################################

    input {
    kb_layout = us,ara
    kb_variant =
    kb_model =
    kb_options = grp:alt_shift_toggle
    kb_rules =
    follow_mouse = 1
    sensitivity = 0.1002
    accel_profile = on
        touchpad {
        natural_scroll = false
        }
       }

    gesture = 3, horizontal, workspace

    device {
    name = epic-mouse-v1
    sensitivity = 0.1002
    }



