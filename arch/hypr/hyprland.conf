#####################################################################
#################                                          ##########
# BY ghvbb      #                                          #  V10   #
#################                                          ##########


        general {
        gaps_in = 2
        gaps_out = 3
        border_size = 3
        col.active_border =  $inverse_primary
        col.inactive_border =  $background
        resize_on_border = true
        allow_tearing = true
        layout = dwindle
        }

        decoration {
        dim_strength = 0.15
        dim_inactive = false
        fullscreen_opacity = 1.00
        rounding = 8
        active_opacity = 1.00
        inactive_opacity = 1.00

        shadow {
        enabled = true
        range = 3
}

        blur {
        enabled = true
        xray = true
        special = true
        new_optimizations = true
        size = 9
        passes = 3
        brightness = 1.0
        noise = 0.0100
        contrast = 0.9900
        vibrancy = 0.9000
        vibrancy_darkness = 0.8000
        popups = false
        popups_ignorealpha = 0.6
        input_methods = true
        input_methods_ignorealpha = 0.1
    }
    }
animations {
    enabled = true

    # ── Material 3 Bezier Curves ──
    bezier = m3_standard, 0.2, 0, 0, 1
    bezier = m3_decel, 0.05, 0.7, 0.1, 1
    bezier = m3_accel, 0.3, 0, 0.8, 0.15
    bezier = m3_linear, 0, 0, 1, 1
    bezier = m3_spring, 0.34, 1.56, 0.64, 1
    bezier = m3_bounce, 0.05, 0.9, 0.1, 1.05

bezier = m3_standard, 0.05, 0.9, 0.1, 1.0
bezier = m3_decel, 0.05, 0.7, 0.1, 1
bezier = m3_accel, 0.3, 0, 0.8, 0.15
bezier = m3_menu, 0.1, 1, 0, 1
animation = windowsIn, 1, 4.5, m3_decel, popin 85%
animation = windowsOut, 1, 3, m3_accel, popin 90%
animation = windowsMove, 1, 4, m3_standard, slide
animation = fadeIn, 1, 3, m3_standard
animation = fadeOut, 1, 3, m3_accel
animation = border, 1, 2, m3_standard
animation = layersIn, 1, 3.5, m3_decel, slide
animation = layersOut, 1, 3, m3_accel, slide
animation = workspaces, 1, 5, m3_bounce, slide
animation = specialWorkspaceIn, 1, 4.5, m3_decel, slidevert
animation = specialWorkspaceOut, 1, 4, m3_accel, slidevert
}

       dwindle {
       pseudotile = true 
       preserve_split = true 
       }

       master {
       new_status = master
       }


      misc { 
     disable_splash_rendering = true
      force_default_wallpaper = 0
      disable_hyprland_logo = true
      vfr = true
      vrr = 1
      animate_manual_resizes = true
      animate_mouse_windowdragging = true
      enable_swallow = true
      swallow_regex = (foot|kitty|allacritty|Alacritty)
       middle_click_paste = false

      }

##################################################
#$$$$$$\ $$\   $$\ $$$$$$$\  $$\   $$\ $$$$$$$$\ #
#\_$$  _|$$$\  $$ |$$  __$$\ $$ |  $$ |\__$$  __|#
