#  By ghvbb      #                                       #   -   #
##################                                       #########

    windowrule {
    name = suppress-maximize-events
    match:class = .*
    suppress_event = maximize
    }

    windowrule {
    name = fix-xwayland-drags
    match:class = ^$
    match:title = ^$
    match:xwayland = true
    match:float = true
    match:fullscreen = false
    match:pin = false

    no_focus = true
  }
  windowrule {
  name = Android
  match:class = Waydroid
  fullscreen = on
  
  }
  windowrule {
  name = files
  match:class = nautilus
  opacity = 1.0
  }
  windowrule {
  name = clocks
  match:class = org.gnome.clocks
  opacity = 1.0
  float = on
  size = 700 540
  }
  windowrule {
  name = web-apps
  match:class = webapp-manager.py
  opacity = 1.0
  float = on
  size = 820 600
  }
  windowrule {
  name = web-browser
  match:class = cromite
  opacity = 1.0 1.0 1.0
  }
  windowrule {
  name = Screenshot-App
  match:class = com.gabm.satty
  opacity = 1.90029
  float = on
  size =  1020 600
  }
  windowrule {
  name = Pavucontrol 
  match:class = org.pulseaudio.pavucontrol
  opacity = 1.0
  float = on 
  size = 1020 600
  }
  windowrule {
  name = Music
  match:class = mpv
  float = on 
  size = 234 233
  }
  windowrule {
  name = Images
  match:class = imv
  float = on
  size = 234 233 2
  }
  windowrule {
  name = Document Viewer
  match:class = org.gnome.Evince
  float = on
  size = 676 658
  }
  windowrule {
  name = Network
  match:class = floating-kitty
  opacity = 0.90234
  float = on
  size = 1120 620
  }
  windowrule {
  name = Calculator
  match:class = org.gnome.Calculator
  float = on
  size = 452 616
  }
  layerrule {
  name = Rofi-Wayland
  match:namespace = rofi
  ignore_alpha = 0.1
  blur = on
  }
  layerrule {
  name = Waybar-Rule
  match:namespace = waybar
  blur = on
  ignore_alpha = 0.1
  }
  layerrule {
  name = Wlogout 
  blur = on
  match:namespace = logout_dialog
  }
  layerrule {
  name = SwayOSD
  blur = on
  match:namespace = swayosd
  ignore_alpha = 0.1
  }
  layerrule {
  name =  Notifications 
  blur = on 
  match:namespace = swaync
  ignore_alpha = 0.1

  }
